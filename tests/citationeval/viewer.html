<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citation Eval Viewer</title>
<style>
  :root {
    --bg: #fafafa;
    --fg: #1a1a1a;
    --muted: #666;
    --border: #ddd;
    --accent: #2563eb;
    --surface: #fff;
    --surface-hover: #f5f5f5;
    --tag-bg: #eee;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.5; }

  header { padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 18px; font-weight: 600; white-space: nowrap; }
  header .meta { color: var(--muted); font-size: 13px; }
  #file-input { font-size: 13px; }
  #drop-zone { display: none; position: fixed; inset: 0; background: rgba(37,99,235,0.08); border: 3px dashed var(--accent); z-index: 100; align-items: center; justify-content: center; font-size: 20px; color: var(--accent); }
  #drop-zone.active { display: flex; }

  .layout { display: flex; height: calc(100vh - 57px); }
  .sidebar { width: 320px; min-width: 260px; border-right: 1px solid var(--border); overflow-y: auto; background: var(--surface); flex-shrink: 0; }
  .main { flex: 1; overflow-y: auto; padding: 24px; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 2; }
  .tabs button { flex: 1; padding: 10px 8px; border: none; background: none; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--muted); border-bottom: 2px solid transparent; }
  .tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tabs button:hover { background: var(--surface-hover); }

  /* Sidebar list */
  .group-header { padding: 8px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); background: var(--tag-bg); position: sticky; top: 38px; z-index: 1; }
  .result-item { padding: 8px 12px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 13px; display: flex; flex-direction: column; gap: 2px; }
  .result-item:hover { background: var(--surface-hover); }
  .result-item.selected { background: #eff6ff; border-left: 3px solid var(--accent); }
  .result-item .query { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-item .tags { display: flex; gap: 4px; flex-wrap: wrap; }

  .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 500; }
  .tag-no_response { background: #fee2e2; color: #991b1b; }
  .tag-no_citations { background: #fef3c7; color: #92400e; }
  .tag-harmony { background: #d1fae5; color: #065f46; }
  .tag-markdown { background: #dbeafe; color: #1e40af; }
  .tag-other { background: #f3e8ff; color: #6b21a8; }
  .tag-error { background: #fee2e2; color: #991b1b; }

  /* Matrix */
  .matrix-section { margin-bottom: 32px; }
  .matrix-section h3 { font-size: 15px; margin-bottom: 8px; }
  table.matrix { border-collapse: collapse; font-size: 13px; width: auto; }
  table.matrix th, table.matrix td { border: 1px solid var(--border); padding: 6px 12px; text-align: center; }
  table.matrix th { background: var(--tag-bg); font-weight: 600; }
  table.matrix td.label { text-align: left; font-weight: 500; white-space: nowrap; }
  table.matrix td.zero { color: #ccc; }
  table.matrix td.nonzero { font-weight: 700; }

  /* Detail view */
  .detail-header { margin-bottom: 16px; }
  .detail-header h2 { font-size: 16px; margin-bottom: 4px; }
  .detail-meta { font-size: 13px; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }
  .detail-nav { display: flex; gap: 8px; margin-bottom: 16px; }
  .detail-nav button { padding: 4px 14px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); cursor: pointer; font-size: 13px; }
  .detail-nav button:hover { background: var(--surface-hover); }
  .detail-nav button:disabled { opacity: 0.4; cursor: default; }
  .detail-nav .pos { font-size: 13px; color: var(--muted); line-height: 30px; }

  .detail-content { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; white-space: pre-wrap; word-break: break-word; font-size: 13px; font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace; line-height: 1.6; max-height: 60vh; overflow-y: auto; }
  .detail-content .hl-harmony { background: #d1fae5; border-radius: 2px; padding: 0 2px; }
  .detail-content .hl-markdown { background: #dbeafe; border-radius: 2px; padding: 0 2px; }
  .detail-content .hl-other { background: #f3e8ff; border-radius: 2px; padding: 0 2px; }

  .detail-example { margin-top: 12px; padding: 8px 12px; background: var(--tag-bg); border-radius: 4px; font-size: 13px; font-family: monospace; word-break: break-all; }
  .detail-error { margin-top: 12px; padding: 8px 12px; background: #fee2e2; border-radius: 4px; font-size: 13px; color: #991b1b; }

  .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 15px; text-align: center; padding: 40px; }

  kbd { display: inline-block; padding: 2px 6px; border: 1px solid var(--border); border-radius: 3px; font-size: 12px; font-family: monospace; background: var(--tag-bg); }
</style>
</head>
<body>

<div id="drop-zone">Drop results.json here</div>

<header>
  <h1>Citation Eval</h1>
  <input type="file" id="file-input" accept=".json">
  <span id="header-meta" class="meta"></span>
</header>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="tabs">
      <button class="active" data-tab="results">Results</button>
      <button data-tab="matrix">Matrix</button>
    </div>
    <div id="sidebar-content"></div>
  </div>
  <div class="main" id="main">
    <div class="empty-state">Load a <code>results.json</code> file to get started.<br><br>Use the file picker above or drag &amp; drop.</div>
  </div>
</div>

<script>
(function() {
  "use strict";

  const OUTCOMES = ["no_response","no_citations","harmony","markdown","other","error"];
  const OUTCOME_LABELS = {
    no_response: "No response",
    no_citations: "No citations",
    harmony: "Harmony \u3010N\u2020LX\u3011",
    markdown: "Markdown [label](url)",
    other: "Other",
    error: "Error"
  };

  // Regexes mirroring main.go classify()
  const RE_HARMONY  = /\u3010\d+\u2020L\d+(-L\d+)?\u3011/g;
  const RE_MARKDOWN = /\[[^\]]+\]\(https?:\/\/[^\s)]+\)/g;
  const RE_OTHER_BRACKET = /\u3010[^\u3011]+\u3011/g;
  const RE_BARE_URL = /(?:^|[\s(])https?:\/\/[^\s)>\]]+/g;

  let data = null;
  let currentIdx = -1;
  let activeTab = "results";

  const $ = s => document.querySelector(s);
  const $$ = s => document.querySelectorAll(s);

  // ── File loading ──

  $("#file-input").addEventListener("change", e => {
    const f = e.target.files[0];
    if (f) readFile(f);
  });

  document.addEventListener("dragover", e => { e.preventDefault(); $("#drop-zone").classList.add("active"); });
  document.addEventListener("dragleave", e => { if (e.relatedTarget === null) $("#drop-zone").classList.remove("active"); });
  document.addEventListener("drop", e => {
    e.preventDefault();
    $("#drop-zone").classList.remove("active");
    const f = e.dataTransfer.files[0];
    if (f) readFile(f);
  });

  function readFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        data = JSON.parse(e.target.result);
        init();
      } catch (err) {
        alert("Failed to parse JSON: " + err.message);
      }
    };
    reader.readAsText(file);
  }

  // ── Init ──

  function init() {
    $("#header-meta").textContent = [data.model, data.enclave, data.date].filter(Boolean).join(" \u2022 ");
    renderSidebar();
    if (activeTab === "matrix") renderMatrix();
    else showResult(0);
  }

  // ── Tabs ──

  $$(".tabs button").forEach(btn => {
    btn.addEventListener("click", () => {
      $$(".tabs button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeTab = btn.dataset.tab;
      renderSidebar();
      if (activeTab === "matrix") renderMatrix();
      else if (data) showResult(currentIdx >= 0 ? currentIdx : 0);
    });
  });

  // ── Sidebar ──

  function renderSidebar() {
    if (!data) return;
    const el = $("#sidebar-content");

    if (activeTab === "matrix") {
      el.innerHTML = renderMatrixSidebar();
      return;
    }

    // Group by format > prompt
    const groups = {};
    data.results.forEach((r, i) => {
      const key = r.format + " \u203a " + r.prompt;
      if (!groups[key]) groups[key] = [];
      groups[key].push({ ...r, _idx: i });
    });

    let html = "";
    for (const [group, items] of Object.entries(groups)) {
      html += `<div class="group-header">${esc(group)}</div>`;
      for (const item of items) {
        html += `<div class="result-item${item._idx === currentIdx ? " selected" : ""}" data-idx="${item._idx}">
          <span class="query">${esc(item.query)}</span>
          <span class="tags"><span class="tag tag-${item.outcome}">${esc(OUTCOME_LABELS[item.outcome] || item.outcome)}</span></span>
        </div>`;
      }
    }
    el.innerHTML = html;

    el.querySelectorAll(".result-item").forEach(el => {
      el.addEventListener("click", () => showResult(parseInt(el.dataset.idx)));
    });
  }

  function renderMatrixSidebar() {
    const formats = uniqueVals("format");
    let html = "";
    for (const fmt of formats) {
      html += `<div class="group-header">format=${esc(fmt)}</div>`;
      const prompts = uniqueValsFor("prompt", r => r.format === fmt);
      for (const outcome of OUTCOMES) {
        for (const prompt of prompts) {
          const matching = data.results.filter(r => r.format === fmt && r.prompt === prompt && r.outcome === outcome);
          if (matching.length === 0) continue;
          for (const r of matching) {
            const idx = data.results.indexOf(r);
            html += `<div class="result-item" data-idx="${idx}">
              <span class="query">${esc(r.query)}</span>
              <span class="tags">
                <span class="tag tag-${r.outcome}">${esc(OUTCOME_LABELS[r.outcome] || r.outcome)}</span>
                <span class="tag" style="background:var(--tag-bg);color:var(--muted)">${esc(r.prompt)}</span>
              </span>
            </div>`;
          }
        }
      }
    }
    html += `<div style="padding:12px;font-size:12px;color:var(--muted)">Click any result to see its detail.</div>`;
    return html;
  }

  // ── Matrix view ──

  function renderMatrix() {
    if (!data) return;
    const main = $("#main");
    const formats = uniqueVals("format");

    let html = `<div class="detail-header"><h2>Aggregate Matrix</h2>
      <div class="detail-meta">${esc(data.model)} &bull; ${esc(data.date)} &bull; ${data.results.length} results</div></div>`;

    for (const fmt of formats) {
      const fmtResults = data.results.filter(r => r.format === fmt);
      const prompts = uniqueValsFor("prompt", r => r.format === fmt);

      html += `<div class="matrix-section"><h3>format=${esc(fmt)} (${fmtResults.length})</h3><table class="matrix"><tr><th>Outcome</th>`;
      for (const p of prompts) html += `<th>${esc(p)}</th>`;
      html += `</tr>`;

      for (const o of OUTCOMES) {
        html += `<tr><td class="label"><span class="tag tag-${o}">${esc(OUTCOME_LABELS[o])}</span></td>`;
        for (const p of prompts) {
          const count = fmtResults.filter(r => r.prompt === p && r.outcome === o).length;
          html += `<td class="${count === 0 ? "zero" : "nonzero"}">${count}</td>`;
        }
        html += `</tr>`;
      }
      html += `</table></div>`;
    }

    main.innerHTML = html;
  }

  // ── Detail view ──

  function showResult(idx) {
    if (!data || idx < 0 || idx >= data.results.length) return;
    currentIdx = idx;
    const r = data.results[idx];

    // Update sidebar selection
    $$(".result-item").forEach(el => {
      el.classList.toggle("selected", parseInt(el.dataset.idx) === idx);
    });
    // Scroll selected into view
    const sel = $(".result-item.selected");
    if (sel) sel.scrollIntoView({ block: "nearest" });

    const main = $("#main");
    let html = `<div class="detail-header">
      <h2>${esc(r.query)}</h2>
      <div class="detail-meta">
        <span>format=<b>${esc(r.format)}</b></span>
        <span>prompt=<b>${esc(r.prompt)}</b></span>
        <span class="tag tag-${r.outcome}">${esc(OUTCOME_LABELS[r.outcome] || r.outcome)}</span>
      </div>
    </div>`;

    html += `<div class="detail-nav">
      <button id="btn-prev" ${idx === 0 ? "disabled" : ""}>&larr; Prev</button>
      <button id="btn-next" ${idx === data.results.length - 1 ? "disabled" : ""}>Next &rarr;</button>
      <span class="pos">${idx + 1} / ${data.results.length} &nbsp; <kbd>j</kbd> <kbd>k</kbd></span>
    </div>`;

    if (r.error) {
      html += `<div class="detail-error"><b>Error:</b> ${esc(r.error)}</div>`;
    }

    if (r.content) {
      html += `<div class="detail-content">${highlightCitations(r.content)}</div>`;
    } else if (!r.error) {
      html += `<div class="detail-content" style="color:var(--muted);font-style:italic">(empty response)</div>`;
    }

    if (r.example) {
      html += `<div class="detail-example"><b>Example match:</b> ${esc(r.example)}</div>`;
    }

    if (r.raw_json) {
      html += `<details style="margin-top:12px"><summary style="cursor:pointer;font-size:13px;color:var(--muted)">Raw JSON</summary>
        <div class="detail-content" style="margin-top:8px;max-height:40vh">${esc(r.raw_json)}</div></details>`;
    }

    main.innerHTML = html;

    $("#btn-prev").addEventListener("click", () => showResult(idx - 1));
    $("#btn-next").addEventListener("click", () => showResult(idx + 1));
  }

  // ── Highlight citations in content ──

  function highlightCitations(text) {
    // Escape HTML first, then apply highlights
    let s = esc(text);

    // Highlight harmony citations: 【N†LX-LY】
    s = s.replace(/\u3010\d+\u2020L\d+(-L\d+)?\u3011/g, m => `<span class="hl-harmony">${m}</span>`);

    // Highlight markdown links: [label](url)
    s = s.replace(/\[[^\]]+\]\(https?:\/\/[^\s)]+\)/g, m => `<span class="hl-markdown">${m}</span>`);

    // Highlight other bracket citations: 【...】
    // Avoid double-highlighting already-wrapped spans
    s = s.replace(/\u3010[^\u3011]+\u3011/g, m => {
      if (m.includes("hl-harmony")) return m;
      return `<span class="hl-other">${m}</span>`;
    });

    return s;
  }

  // ── Keyboard nav ──

  document.addEventListener("keydown", e => {
    if (!data) return;
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    if (e.key === "j" || e.key === "ArrowDown") { e.preventDefault(); showResult(currentIdx + 1); }
    if (e.key === "k" || e.key === "ArrowUp") { e.preventDefault(); showResult(currentIdx - 1); }
  });

  // ── Helpers ──

  function uniqueVals(key) {
    const seen = new Set();
    return data.results.filter(r => { if (seen.has(r[key])) return false; seen.add(r[key]); return true; }).map(r => r[key]);
  }

  function uniqueValsFor(key, pred) {
    const seen = new Set();
    return data.results.filter(pred).filter(r => { if (seen.has(r[key])) return false; seen.add(r[key]); return true; }).map(r => r[key]);
  }

  function esc(s) {
    if (!s) return "";
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
