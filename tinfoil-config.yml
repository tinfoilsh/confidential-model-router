cvm-version: 0.10.4
memory: 16384
cpus: 8

containers:
  - name: "proxy"
    image: "ghcr.io/tinfoilsh/confidential-model-router@sha256:4f6e30699c49d8c38797096a7b83809f360335b4d70b34e147891e93480988a6" # v0.0.114
    restart: always
    networks: [web]
    env:
      - DOMAIN
      - REFRESH_INTERVAL: "1m"
      - CACHE_SALT_ENABLED: "true"
      - USAGE_REPORTER_ID: "model-router"
      - CONTROL_PLANE_URL: "https://api.tinfoil.sh"
    secrets:
      - USAGE_REPORTER_SECRET
      - USAGE_CONTEXT_SECRET
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8089/health"]
      interval: 30s
      timeout: 5s
      start_period: 5m

networks:
  web:
    egress: open

shim:
  upstream-port: 8089
  tls-wildcard: true
