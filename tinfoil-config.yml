cvm-version: 0.7.5
memory: 16384
cpus: 8

containers:
  - name: "proxy"
    image: "ghcr.io/tinfoilsh/confidential-model-router@sha256:c23c83f4ddea620fc5c76141fea4ec443833162c090975a311a56cfd4b27b4f0" # v0.0.84
    restart: always
    env:
      - DOMAIN
      - REFRESH_INTERVAL: "1m"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8089/health"]
      interval: 30s
      timeout: 5s
      start_period: 5m

shim:
  upstream-port: 8089
  tls-wildcard: true
