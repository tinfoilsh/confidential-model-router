cvm-version: 0.10.8
memory: 16384
cpus: 8

containers:
  - name: "proxy"
    image: "ghcr.io/tinfoilsh/confidential-model-router@sha256:621a5b011b19ca5df92429965b17e1122a747ff53f86c99badd191a52f3e62b7" # v0.0.130
    restart: always
    networks: [web]
    env:
      - DOMAIN
      - REFRESH_INTERVAL: "1m"
      - CACHE_SALT_ENABLED: "true"
      - USAGE_REPORTER_ID: "model-router"
      - CONTROL_PLANE_URL: "https://api.tinfoil.sh"
      - UPDATE_CONFIG_URL: "https://api.tinfoil.sh/api/shim/router-config"
    secrets:
      - USAGE_REPORTER_SECRET
      - USAGE_CONTEXT_SECRET
      - CACHE_ROUTE_SECRET
      - METRICS_API_KEY
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8089/health"]
      interval: 30s
      timeout: 5s
      start_period: 5m

networks:
  web:
    egress: open

shim:
  upstream-port: 8089
  tls-wildcard: true
  paths:
    - /
    - /health
    - /.well-known/tinfoil-proxy
    - /.well-known/prometheus-targets
    - /metrics
    - /v1/*
  authenticated: true
  authenticated-endpoints:
    - /metrics
