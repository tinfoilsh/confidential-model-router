cvm-version: 0.7.5
memory: 16384
cpus: 8

containers:
  - name: "proxy"
    image: "ghcr.io/tinfoilsh/confidential-model-router@sha256:e0b74a583e5a06a931c76f01ebbfe9d354e14c9ea16a32b1cb32e4986b52c8b8" # v0.0.99
    restart: always
    env:
      - DOMAIN
      - REFRESH_INTERVAL: "1m"
      - USAGE_REPORTER_ID: "model-router"
      - CONTROL_PLANE_URL: "https://api.tinfoil.sh"
    secrets:
      - USAGE_REPORTER_SECRET
      - USAGE_CONTEXT_SECRET
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8089/health"]
      interval: 30s
      timeout: 5s
      start_period: 5m

shim:
  upstream-port: 8089
  tls-wildcard: true
