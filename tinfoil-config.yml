cvm-version: 0.7.5
memory: 16384
cpus: 8

containers:
  - name: "proxy"
    image: "ghcr.io/tinfoilsh/confidential-model-router@sha256:5ea40b8fc7e2717867124a0aaa9b9e8c5e904b5d94eef49aff2c4c140dd8d692" # v0.0.86
    restart: always
    env:
      - DOMAIN
      - REFRESH_INTERVAL: "1m"
      - USAGE_REPORTER_ID: "model-router"
      - CONTROL_PLANE_URL: "https://api.tinfoil.sh"
    secrets:
      - USAGE_REPORTER_SECRET
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8089/health"]
      interval: 30s
      timeout: 5s
      start_period: 5m

shim:
  upstream-port: 8089
  tls-wildcard: true
