cvm-version: 0.8.1
memory: 16384
cpus: 8

containers:
  - name: "proxy"
    image: "ghcr.io/tinfoilsh/confidential-model-router@sha256:58a9df58c5e5435e1ee9917f31d3528da329bf8a5cb2a0d685e27caab07a8d77" # v0.0.95
    restart: always
    env:
      - DOMAIN
      - REFRESH_INTERVAL: "1m"
      - USAGE_REPORTER_ID: "model-router"
      - CONTROL_PLANE_URL: "https://api.tinfoil.sh"
    secrets:
      - USAGE_REPORTER_SECRET
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8089/health"]
      interval: 30s
      timeout: 5s
      start_period: 5m

shim:
  upstream-port: 8089
  tls-wildcard: true
