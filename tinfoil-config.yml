cvm-version: 0.10.4
memory: 16384
cpus: 8

containers:
  - name: "proxy"
    image: "ghcr.io/tinfoilsh/confidential-model-router@sha256:95c5f43476b4c8026e921f5fb3e78533263e70af92024664f06ecb2a8a5b6294" # v0.0.109
    restart: always
    networks: [web]
    env:
      - DOMAIN
      - REFRESH_INTERVAL: "1m"
      - USAGE_REPORTER_ID: "model-router"
      - CONTROL_PLANE_URL: "https://api.tinfoil.sh"
    secrets:
      - USAGE_REPORTER_SECRET
      - USAGE_CONTEXT_SECRET
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8089/health"]
      interval: 30s
      timeout: 5s
      start_period: 5m

networks:
  web:
    egress: open

shim:
  upstream-port: 8089
  tls-wildcard: true
