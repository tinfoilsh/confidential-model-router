cvm-version: 0.10.8
memory: 16384
cpus: 8

containers:
  - name: "proxy"
    image: "ghcr.io/tinfoilsh/confidential-model-router@sha256:d3df615d170041a3ffdacfe021ea765038a2d0693f38f4a79358f88bd602191b" # v0.0.120
    restart: always
    networks: [web]
    env:
      - DOMAIN
      - REFRESH_INTERVAL: "1m"
      - CACHE_SALT_ENABLED: "true"
      - USAGE_REPORTER_ID: "model-router"
      - CONTROL_PLANE_URL: "https://api.tinfoil.sh"
    secrets:
      - USAGE_REPORTER_SECRET
      - USAGE_CONTEXT_SECRET
      - CACHE_ROUTE_SECRET
      - METRICS_API_KEY
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8089/health"]
      interval: 30s
      timeout: 5s
      start_period: 5m

networks:
  web:
    egress: open

shim:
  upstream-port: 8089
  tls-wildcard: true
  paths:
    - /
    - /health
    - /.well-known/tinfoil-proxy
    - /.well-known/prometheus-targets
    - /metrics
    - /v1/*
  authenticated: true
  authenticated-endpoints:
    - /metrics
