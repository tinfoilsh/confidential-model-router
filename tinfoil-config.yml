cvm-version: 0.7.5
memory: 16384
cpus: 8

containers:
  - name: "proxy"
    image: "ghcr.io/tinfoilsh/confidential-model-router@sha256:f1dcd64d4b05f8534065569b4bb846a07843ccd35bad1b2e2e332569fcf91e65" # v0.0.85
    restart: always
    env:
      - DOMAIN
      - REFRESH_INTERVAL: "1m"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8089/health"]
      interval: 30s
      timeout: 5s
      start_period: 5m

shim:
  upstream-port: 8089
  tls-wildcard: true
