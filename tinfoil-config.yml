cvm-version: 0.7.5
memory: 16384
cpus: 8

containers:
  - name: "proxy"
    image: "ghcr.io/tinfoilsh/confidential-model-router@sha256:cf118b2da1ec0992279b7e1cba2be936b6e1cd1eee73e183e415fdd94b23042e" # v0.0.81
    restart: always
    env:
      - DOMAIN
      - REFRESH_INTERVAL: "1m"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8089/health"]
      interval: 30s
      timeout: 5s
      start_period: 5m

shim:
  upstream-port: 8089
  tls-wildcard: true
